version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-2024-01-01}
        VCS_REF: ${VCS_REF:-latest}
    
    image: opensuse-leap:15.4-prod
    container_name: opensuse-leap-prod
    
    ports:
      - "3000:3000"
    
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    
    environment:
      - TZ=America/Sao_Paulo
      - NODE_ENV=production
      - LOG_LEVEL=info
    
    restart: always
    
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=app"
    
    security_opt:
      - no-new-privileges:true
    
    cap_drop:
      - ALL
    
    cap_add:
      - NET_BIND_SERVICE
    
    networks:
      - app-network

  # Nginx proxy reverso para HTTPS
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-prod
    
    ports:
      - "443:443"
      - "80:80"
    
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl/certs:/etc/nginx/certs:ro
      - ./ssl/private:/etc/nginx/private:ro
    
    depends_on:
      - app
    
    restart: always
    
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=nginx"
    
    networks:
      - app-network
    
    cap_drop:
      - ALL
    
    cap_add:
      - NET_BIND_SERVICE

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  app_data:
    driver: local
  app_logs:
    driver: local
