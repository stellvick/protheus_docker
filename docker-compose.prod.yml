version: '3.8'

# Docker Compose para produção com Coolify + Traefik
# Este arquivo é otimizado para Coolify com Traefik como proxy reverso.
# NÃO exponha portas 80/443 - Traefik já gerencia isso!

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-2024-01-01}
        VCS_REF: ${VCS_REF:-latest}
    
    image: opensuse-leap:15.4-prod
    container_name: opensuse-leap-prod
    
    # Porta interna apenas - Traefik roteia
    ports:
      - "3000:3000"
    
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    
    environment:
      - TZ=America/Sao_Paulo
      - NODE_ENV=production
      - LOG_LEVEL=info
    
    restart: always
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=app"
    
    security_opt:
      - no-new-privileges:true
    
    cap_drop:
      - ALL
    
    cap_add:
      - NET_BIND_SERVICE

networks:
  default:
    driver: bridge
