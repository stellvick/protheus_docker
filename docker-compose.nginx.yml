version: '3.8'

# Docker Compose com Nginx para desenvolvimento/testes locais
# Use ESTE arquivo se NÃO estiver usando Coolify
# 
# Para usar: docker-compose -f docker-compose.nginx.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    
    image: opensuse-leap:15.4
    container_name: opensuse-leap-app
    
    ports:
      - "3000:3000"
    
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    
    environment:
      - TZ=America/Sao_Paulo
      - NODE_ENV=production
      - LOG_LEVEL=info
    
    restart: unless-stopped
    
    networks:
      - app-network

  # Nginx proxy reverso para HTTPS (local)
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: nginx-local:1.27-alpine
    container_name: nginx-local
    
    ports:
      - "443:443"
      - "80:80"
    
    volumes:
      - ./ssl/certs:/etc/nginx/certs:ro
      - ./ssl/private:/etc/nginx/private:ro
    
    depends_on:
      - app
    
    restart: unless-stopped
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
