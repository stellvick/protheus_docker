services:
  license:
    build:
      context: .
      dockerfile: license.Dockerfile
    restart: unless-stopped
    networks:
      - protheus-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  postgres-iniciado:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=protheus
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - protheus-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  dbaccess-postgres:
    build:
      context: .
      dockerfile: dbaccess.Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres-iniciado
      - license
    networks:
      - protheus-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  appserver:
    build:
      context: .
      dockerfile: appserver.Dockerfile
    restart: unless-stopped
    depends_on:
      - dbaccess-postgres
      - license
    ports:
      - "1234:1234"
      - "8080:8080"
      - "8081:8081"
    networks:
      - protheus-net
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

volumes:
  postgres-data:

networks:
  protheus-net:
    driver: bridge
