version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: opensuse-leap:15.4
    container_name: opensuse-leap-app
    
    # Configuração de rede
    ports:
      - "80:80"
      - "443:443"
      - "3000:3000"  # Porta padrão de desenvolvimento
      - "9000:9000"  # Protheus Broker
      - "8000-8010:8000-8010"  # AppServers (sec01, sec02, etc)
      - "7000:7000"  # DBAccess
      - "6000:6000"  # License Server
    
    # Volumes
    volumes:
      - ./data:/app/data
      - ./ssl:/app/ssl:ro  # Para certificados SSL/TLS
      - ./logs:/app/logs
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /var/run:/var/run  # Para arquivos PID dos serviços
      - /var/lock:/var/lock  # Para lock files dos serviços
    
    # Variáveis de ambiente
    environment:
      - TZ=America/Sao_Paulo
      - NODE_ENV=production
    
    # Configuração de saúde
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Reinicialização automática
    restart: unless-stopped
    
    # Limites de recurso (opcional)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Segurança (permitindo capacidades necessárias para serviços Protheus)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SYS_PTRACE  # Necessário para monitorar processos
      - DAC_OVERRIDE  # Necessário para criar/modificar arquivos em /var/run e /var/lock

networks:
  app-network:
    driver: bridge
