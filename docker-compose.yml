version: "3.6"

services:
  license:
    image: "totvsengpro/license-dev"
    networks:
      - protheus-network
    labels:
      - caddy_0=https://<subdomínio-license>.coolify.stellvick.fun
      - caddy_0.reverse_proxy={{upstreams 5555}}
      - caddy_0.encode=zstd gzip 

  postgres-iniciado:
    image: "totvsengpro/postgres-dev:12.1.2410_bra"
    environment:
      - POSTGRES_DB=protheus
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - protheus-network

  appserver:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres-iniciado
      - license
    networks:
      - protheus-network
    ports:
      - "1234:1234"
      - "8080:8080"
      - "8081:8081"
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 && curl -f http://localhost:8081 && curl -f http://localhost:9090"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:

networks:
  protheus-network:
    driver: bridge
