services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROTHEUS_GDRIVE_ID: ${PROTHEUS_GDRIVE_ID:-1G6aAGlfbAbLv2u8MicoSzjuCdrYJfvf8}

    ports:
      - "3000:3000"
      - "9000:9000"
      - "8000-8010:8000-8010"
      - "7000:7000"
      - "6000:6000"

    volumes:
      - ./data:/app/data
      - ./logs:/app/totvs/protheus/bin/log

    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-tpprd}
      - DB_USER=${DB_USER:-tpprd}
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - ODBCINI=/etc/unixODBC/odbc.ini
      - ODBCSYSINI=/etc/unixODBC

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - app-network

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tpprd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-tpprd}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=pt_BR.UTF-8"
      TZ: ${TZ:-America/Sao_Paulo}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tpprd} -d ${POSTGRES_DB:-tpprd}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - app-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
