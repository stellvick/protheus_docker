version: "3.6"

services:
  license:
    image: "totvsengpro/license-dev"
    networks:
      - protheus-network
    labels:
      - caddy_0=https://<subdomínio-license>.coolify.stellvick.fun
      - caddy_0.reverse_proxy={{upstreams 5555}}
      - caddy_0.encode=zstd gzip 

  postgres-iniciado:
    image: "totvsengpro/postgres-dev:12.1.2410_bra"
    environment:
      - POSTGRES_DB=protheus
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - protheus-network

  dbaccess:
    build:
      context: .
      dockerfile: Dockerfile.dbaccess
    depends_on:
      - postgres-iniciado
    networks:
      - protheus-network

  appserver:
    build:
      context: .
      dockerfile: Dockerfile.appserver
    depends_on:
      - postgres-iniciado
      - license
      - dbaccess
    environment:
      - TOTVS_DBSERVER=dbaccess
    networks:
      - protheus-network
    ports:
      - "1234:1234"
      - "8080:8080"
      - "8081:8081"
      - "9090:9090"

  adminer:
    image: adminer
    restart: always
    ports:
      - "8082:8080"
    networks:
      - protheus-network

volumes:
  postgres_data:

networks:
  protheus-network:
    driver: bridge
