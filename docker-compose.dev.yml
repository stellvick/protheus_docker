version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: opensuse-leap:15.4-dev
    container_name: opensuse-leap-dev
    
    ports:
      - "3000:3000"
      - "5000:5000"
      - "8080:8080"
    
    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/app/data
      - ./logs:/app/logs
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    
    environment:
      - TZ=America/Sao_Paulo
      - NODE_ENV=development
      - DEBUG=*
    
    restart: unless-stopped
    
    command: /bin/bash
    stdin_open: true
    tty: true
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL (opcional)
  postgres:
    image: postgres:15-alpine
    container_name: postgres-dev
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    
    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    restart: unless-stopped

  # Redis (opcional)
  redis:
    image: redis:7-alpine
    container_name: redis-dev
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis_data:/data
    
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
