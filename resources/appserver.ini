[environment]
rpodb=top
rpoversion=120
rpolanguage=multi
sourcepath=/opt/totvs/protheus/apo
rootpath=/opt/totvs/protheus/protheus_data
RPOCustom=/opt/totvs/protheus/apo/custom.rpo
startpath=/system
dbdatabase=POSTGRES
dbalias=protheus
dbserver=dbaccess-postgres
dbport=7890
topmemomega=10
specialkey=exemplo

[general]
buildkillusers=1
consolelog=1
consolefile=/opt/totvs/appserver/console.log
maxstringsize=10
app_environment=environment
BuildKillUsers=1

[drivers]
active=tcp
MultiProtocolPort=1
MultiProtocolPortSecure=1

[tcp]
type=tcpip
port=1234

[webapp]
enable=1
EnvServer=environment
port=8080

[lockserver]
enable=0
server=NOCONFIG
port=1234

[licenseclient]
server=license
port=5555

[webapp/webapp]
mpp=

[HTTPV11]
ENABLE=1
SOCKETS=HTTPREST

[ONSTART]
JOBS=HTTPJOB
REFRESHRATE=30

[HTTPURI]
URL=/REST
INSTANCES=1,2
PREPAREIN=ALL

[HTTPREST]
SECURITY=1
PORT=8081
URIS=HTTPURI

[HTTPJOB]
MAIN=HTTP_START
ENVIRONMENT=environment
